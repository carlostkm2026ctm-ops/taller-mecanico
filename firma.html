<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Firma - Taller Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .public-wrap { max-width: 760px; margin: 0 auto; padding: 28px 18px 48px; }
    .public-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--border-radius); overflow: hidden; box-shadow: var(--shadow-md); }
    .public-head { padding: 18px 18px; background: rgba(0,0,0,.18); border-bottom: 1px solid var(--border-color); display:flex; justify-content: space-between; align-items:center; gap: 12px; }
    .public-head h1 { font-size: 1.05rem; margin: 0; display:flex; align-items:center; gap:10px; }
    .public-head .chip { padding: 6px 10px; border-radius: 999px; font-weight: 800; font-size: .75rem; border: 1px solid var(--border-color); color: var(--text-secondary); background: rgba(255,255,255,.03); white-space: nowrap; }
    .public-body { padding: 18px; display: grid; gap: 12px; }
    .public-note { padding: 12px 12px; border-radius: 14px; border: 1px solid var(--border-color); background: rgba(0,0,0,.12); color: var(--text-secondary); }
    .canvas-wrap { border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; overflow: hidden; background: rgba(0,0,0,.20); }
    canvas { width: 100%; height: 220px; display: block; touch-action: none; }
    .sig-actions { display:grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 520px){ .sig-actions{ grid-template-columns: 1fr 1fr 1fr; } }
    .btn-public { width: 100%; padding: 0.95rem 1rem; border-radius: 14px; font-weight: 900; border: 0; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
    .btn-public:disabled { opacity: .6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn-save { background: linear-gradient(135deg, var(--success-neon), #10b981); color: var(--bg-primary); box-shadow: 0 10px 24px rgba(0,255,136,.18); }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(0,255,136,.24); }
    .btn-clear { background: linear-gradient(135deg, #f59e0b, #d97706); color: var(--bg-primary); }
    .btn-clear:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(245,158,11,.18); }
    .btn-secondary2 { background: rgba(255,255,255,.06); color: var(--text-primary); border: 1px solid rgba(255,255,255,.10); }
    .public-footer { padding: 14px 18px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,.14); color: var(--text-muted); font-size: .85rem; display:flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .public-status { font-weight: 900; }
  </style>
</head>
<body>
  <div class="public-wrap">
    <div class="public-card">
      <div class="public-head">
        <h1><i class="fas fa-pen-nib" style="color:#60a5fa;"></i> Firma</h1>
        <span class="chip" id="chipPatente">-</span>
      </div>

      <div class="public-body">
        <div class="empty-state" id="estadoCarga" style="padding: 22px 12px;">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Cargando…</p>
        </div>

        <div id="contenido" class="hidden">
          <div id="resultado" class="public-note hidden">
            <div id="resultadoTitulo" style="font-weight:900; color: var(--text-primary); margin-bottom: 4px;"></div>
            <div id="resultadoDetalle" style="color: var(--text-secondary);"></div>
          </div>

          <div class="public-note">
            <div style="font-weight:900; color: var(--text-primary); margin-bottom: 4px;" id="tituloTipo">Firma</div>
            <div id="subInfo"></div>
          </div>

          <div class="canvas-wrap">
            <canvas id="canvasFirma" width="1200" height="420"></canvas>
          </div>

          <div class="sig-actions">
            <button class="btn-public btn-clear" id="btnLimpiar" type="button"><i class="fas fa-eraser"></i> Limpiar</button>
            <button class="btn-public btn-save" id="btnGuardar" type="button"><i class="fas fa-save"></i> Guardar firma</button>
            <button class="btn-public btn-secondary2" id="btnVer" type="button"><i class="fas fa-eye"></i> Ver firma</button>
          </div>
        </div>
      </div>

      <div class="public-footer">
        <span>Firma digital para respaldo.</span>
        <span class="public-status" id="estadoFirma">—</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="firma.js?v=20260430-1"></script>
</body>
</html>
