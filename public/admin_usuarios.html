<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Gestión de Usuarios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .admin-header {
        background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(59, 130, 246, 0.05));
        border-bottom: 1px solid var(--border-color);
        padding: 24px;
      }
      
      .create-user-card {
        background: linear-gradient(135deg, rgba(6, 182, 212, 0.05), rgba(59, 130, 246, 0.03));
        border: 1px solid rgba(6, 182, 212, 0.2);
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 32px;
      }
      
      .create-user-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }
      
      .create-user-icon {
        width: 56px;
        height: 56px;
        background: var(--accent-gradient);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .create-user-icon svg {
        width: 28px;
        height: 28px;
        color: white;
      }
      
      .create-user-title {
        font-size: 20px;
        font-weight: 700;
      }
      
      .create-user-subtitle {
        color: var(--text-muted);
        font-size: 14px;
      }
      
      .role-selector {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      
      .role-option {
        position: relative;
        padding: 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        cursor: pointer;
        transition: all var(--transition-normal);
        text-align: center;
      }
      
      .role-option:hover {
        border-color: rgba(6, 182, 212, 0.3);
        background: rgba(6, 182, 212, 0.05);
      }
      
      .role-option.selected {
        border-color: var(--accent-primary);
        background: rgba(6, 182, 212, 0.1);
      }
      
      .role-option input {
        position: absolute;
        opacity: 0;
      }
      
      .role-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 8px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .role-option[data-role="admin"] .role-icon {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
      }
      
      .role-option[data-role="mecanico"] .role-icon {
        background: rgba(6, 182, 212, 0.2);
        color: var(--accent-secondary);
      }
      
      .role-name {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 4px;
      }
      
      .role-desc {
        font-size: 12px;
        color: var(--text-muted);
      }
      
      .users-section {
        margin-top: 32px;
      }
      
      .users-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      
      .users-title {
        font-size: 20px;
        font-weight: 700;
      }
      
      .user-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        margin-bottom: 12px;
        transition: all var(--transition-normal);
      }
      
      .user-row:hover {
        border-color: rgba(6, 182, 212, 0.3);
        background: rgba(6, 182, 212, 0.03);
      }
      
      .user-info {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      
      .user-avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
      }
      
      .user-avatar.admin {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
      }
      
      .user-avatar.mecanico {
        background: rgba(6, 182, 212, 0.2);
        color: var(--accent-secondary);
      }
      
      .user-name {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 2px;
      }
      
      .user-role {
        font-size: 12px;
        color: var(--text-muted);
      }
      
      .user-actions {
        display: flex;
        gap: 8px;
      }
      
      .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        padding: 4px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 10px;
        width: fit-content;
      }
      
      .filter-tab {
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        background: transparent;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      
      .filter-tab:hover {
        color: var(--text-primary);
      }
      
      .filter-tab.active {
        background: rgba(6, 182, 212, 0.15);
        color: var(--accent-secondary);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" style="overflow:hidden;">
        <!-- Header -->
        <div class="admin-header">
          <div class="row-between">
            <div class="row">
              <div class="login-logo" style="width:48px;height:48px;font-size:22px;margin-right:16px;">👥</div>
              <div>
                <h1 style="font-size:22px;font-weight:700;">Gestión de Usuarios</h1>
                <p style="color:var(--text-muted);font-size:13px;margin-top:4px;">Administra cuentas de administradores y mecánicos</p>
              </div>
            </div>
            <div class="row">
              <div class="toolbar-user">
                <div class="avatar" id="userAvatar">A</div>
                <span id="userLabel">Admin</span>
              </div>
              <button class="btn btn-danger" id="logoutBtn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Salir
              </button>
            </div>
          </div>
        </div>
        
        <!-- Content -->
        <div style="padding:32px;">
          <!-- Create User Card -->
          <div class="create-user-card">
            <div class="create-user-header">
              <div class="create-user-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="8.5" cy="7" r="4"></circle>
                  <line x1="20" y1="8" x2="20" y2="14"></line>
                  <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
              </div>
              <div>
                <div class="create-user-title">Crear Nuevo Usuario</div>
                <div class="create-user-subtitle">Solo los administradores pueden crear nuevas cuentas</div>
              </div>
            </div>
            
            <form id="createUserForm">
              <div style="margin-bottom:20px;">
                <label style="display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">Tipo de Usuario</label>
                <div class="role-selector">
                  <label class="role-option selected" data-role="admin">
                    <input type="radio" name="role" value="admin" checked />
                    <div class="role-icon">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                      </svg>
                    </div>
                    <div class="role-name">Jefe / Admin</div>
                    <div class="role-desc">Acceso completo al sistema</div>
                  </label>
                  <label class="role-option" data-role="mecanico">
                    <input type="radio" name="role" value="mecanico" />
                    <div class="role-icon">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                      </svg>
                    </div>
                    <div class="role-name">Mecánico</div>
                    <div class="role-desc">Solo sus trabajos asignados</div>
                  </label>
                </div>
              </div>
              
              <div class="field-group">
                <div class="field">
                  <label>Username</label>
                  <div style="position:relative;">
                    <input name="username" placeholder="Ej: admin01" required minlength="3" style="padding-left:44px;" />
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                      <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                  </div>
                </div>
                
                <div class="field">
                  <label>Contraseña</label>
                  <div style="position:relative;">
                    <input name="password" type="password" placeholder="Mínimo 6 caracteres" required minlength="6" style="padding-left:44px;" />
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);">
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                  </div>
                </div>
              </div>
              
              <div id="mecanicoFields" style="display:none;">
                <div class="divider"></div>
                <div style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--accent-secondary);">Datos del Empleado</div>
                <div class="field-group">
                  <div class="field">
                    <label>Nombre Completo</label>
                    <input name="nombre" placeholder="Ej: Juan Pérez" />
                  </div>
                  <div class="field">
                    <label>Teléfono</label>
                    <input name="telefono" placeholder="Ej: +52 123 456 7890" />
                  </div>
                </div>
                <div class="field">
                  <label>Puesto / Especialidad</label>
                  <input name="puesto" placeholder="Ej: Mecánico General" />
                </div>
              </div>
              
              <button class="btn btn-success" type="submit" style="width:100%;margin-top:8px;padding:16px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="8.5" cy="7" r="4"></circle>
                  <line x1="20" y1="8" x2="20" y2="14"></line>
                  <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
                Crear Usuario
              </button>
            </form>
            <div id="createMsg" style="margin-top:16px;"></div>
          </div>
          
          <!-- Users List Section -->
          <div class="users-section">
            <div class="users-header">
              <div>
                <h2 class="users-title">Usuarios Registrados</h2>
                <p style="color:var(--text-muted);font-size:13px;margin-top:4px;">Gestiona y edita cuentas existentes</p>
              </div>
              <div class="row">
                <button class="btn" id="backBtn" type="button">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                  </svg>
                  Volver
                </button>
                <button class="btn btn-primary" id="refreshBtn" type="button">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                  </svg>
                  Actualizar
                </button>
              </div>
            </div>
            
            <div class="filter-tabs">
              <button class="filter-tab active" data-filter="all">Todos</button>
              <button class="filter-tab" data-filter="admin">Administradores</button>
              <button class="filter-tab" data-filter="mecanico">Mecánicos</button>
            </div>
            
            <div id="content">
              <div class="empty-state" style="padding:60px 20px;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:16px;opacity:0.5;">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <p style="color:var(--text-muted);">Cargando usuarios...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div class="modalOverlay" id="modalOverlay">
      <div class="modal card card-premium">
        <div class="modalHeader">
          <h2 class="modalTitle" id="modalTitle">Editar Usuario</h2>
          <button class="btn btn-icon" id="modalCloseBtn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modalBody">
          <div id="modalMsg" class="text-muted" style="margin-bottom:16px;"></div>
          <form id="userForm"></form>
          <div style="height:20px;"></div>
          <div class="row-between">
            <div></div>
            <button class="btn btn-success" id="saveBtn" type="submit" form="userForm">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/admin_usuarios.js"></script>
  </body>
</html>
