<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Taller Mecánico - Login</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        background: #0a0f1a;
        color: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #111827;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      .logo {
        width: 70px;
        height: 70px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, #06b6d4, #22d3ee);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }
      h1 {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }
      p.subtitle {
        text-align: center;
        color: #94a3b8;
        margin-bottom: 30px;
        font-size: 14px;
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        color: #f8fafc;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        outline: none;
      }
      input:focus {
        border-color: #06b6d4;
      }
      button {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #06b6d4, #0891b2);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 8px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.3);
        color: #f87171;
        padding: 12px;
        border-radius: 8px;
        margin-top: 16px;
        font-size: 14px;
      }
      .success {
        background: rgba(16,185,129,0.1);
        border: 1px solid rgba(16,185,129,0.3);
        color: #34d399;
        padding: 12px;
        border-radius: 8px;
        margin-top: 16px;
        font-size: 14px;
      }
      @media (max-width: 480px) {
        .card { padding: 30px 20px; }
        h1 { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🔧</div>
      <h1>Taller Mecánico</h1>
      <p class="subtitle">Acceso para administradores</p>
      
      <form id="loginForm">
        <div class="field">
          <label>Usuario</label>
          <input type="text" name="username" required autocomplete="username" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" id="submitBtn">Iniciar Sesión</button>
      </form>
      
      <div id="msg"></div>
    </div>

    <script>
      const TOKEN_KEY = "taller_token_v1";
      
      document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const msgDiv = document.getElementById("msg");
        const btn = document.getElementById("submitBtn");
        const username = document.querySelector('input[name="username"]').value;
        const password = document.querySelector('input[name="password"]').value;
        
        msgDiv.innerHTML = "Enviando...";
        btn.disabled = true;
        
        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/auth/login", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            btn.disabled = false;
            
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                if (data.token) {
                  localStorage.setItem(TOKEN_KEY, data.token);
                  msgDiv.innerHTML = '<div class="success">¡Éxito! Redirigiendo...</div>';
                  window.location.href = "/app.html";
                } else {
                  msgDiv.innerHTML = '<div class="error">Error: no se recibió token</div>';
                }
              } catch(e) {
                msgDiv.innerHTML = '<div class="error">Error al procesar respuesta</div>';
              }
            } else if (xhr.status === 401) {
              msgDiv.innerHTML = '<div class="error">Usuario o contraseña incorrectos</div>';
            } else {
              msgDiv.innerHTML = '<div class="error">Error del servidor: ' + xhr.status + '</div>';
            }
          }
        };
        
        xhr.onerror = function() {
          btn.disabled = false;
          msgDiv.innerHTML = '<div class="error">Error de conexión. Verifica tu red.</div>';
        };
        
        xhr.send(JSON.stringify({ username: username, password: password }));
      });
    </script>
  </body>
</html>
