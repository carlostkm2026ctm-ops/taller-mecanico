<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Documento - Taller Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .public-wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 48px; }
    .public-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--border-radius); overflow: hidden; box-shadow: var(--shadow-md); }
    .public-head { padding: 18px 18px; background: rgba(0,0,0,.18); border-bottom: 1px solid var(--border-color); display:flex; justify-content: space-between; align-items:center; gap: 12px; }
    .public-head h1 { font-size: 1.05rem; margin: 0; display:flex; align-items:center; gap:10px; }
    .public-head .chip { padding: 6px 10px; border-radius: 999px; font-weight: 800; font-size: .75rem; border: 1px solid var(--border-color); color: var(--text-secondary); background: rgba(255,255,255,.03); white-space: nowrap; }
    .public-body { padding: 18px; display: grid; gap: 12px; }
    .doc-frame { background:#fff; border-radius: 14px; overflow:hidden; border: 1px solid rgba(255,255,255,.10); }
    .doc-actions { display:flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .btn-public { padding: 0.75rem 1rem; border-radius: 12px; font-weight: 900; border: 0; cursor: pointer; }
    .btn-print { background: linear-gradient(135deg, var(--success-neon), #10b981); color: var(--bg-primary); }
    .btn-copy { background: rgba(255,255,255,.06); color: var(--text-primary); border: 1px solid rgba(255,255,255,.10); }
  </style>
</head>
<body>
  <div class="public-wrap">
    <div class="public-card">
      <div class="public-head">
        <h1><i class="fas fa-receipt" style="color:#f59e0b;"></i> Documento</h1>
        <span class="chip" id="chipTipo">-</span>
      </div>

      <div class="public-body">
        <div class="empty-state" id="estadoCarga" style="padding: 22px 12px;">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Cargando…</p>
        </div>

        <div id="contenido" class="hidden">
          <div class="doc-actions">
            <button class="btn-public btn-copy" type="button" id="btnCopiar"><i class="fas fa-link"></i> Copiar link</button>
            <button class="btn-public btn-print" type="button" id="btnImprimir"><i class="fas fa-print"></i> Imprimir</button>
          </div>
          <div class="doc-frame">
            <iframe id="docIframe" title="documento" style="width:100%;height:70vh;border:0;"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="factura.js?v=20260429-1"></script>
</body>
</html>
